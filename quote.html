<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적 요청 | SHOREA</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
<div class="logo">
<img src="assets/logo.svg" alt="SHOREA" height="60">
</div>

<nav>
<a href="index.html">홈</a>
<a href="contact.html">문의하기</a>
</nav>
</header>

<section class="section">

<h1 class="section-title">
공장 찾기 & 견적 비교
</h1>

<div class="card">

<form>

<label>제품명</label> <input type="text" placeholder="예: 농구공">

<br><br>

<label>예상 수량</label> <input type="number" placeholder="예: 1000">

<br><br>

<label>희망 단가 (USD)</label> <input type="text" placeholder="예: 2.5">

<br><br>

<label>MOQ (최소 주문 수량)</label> <input type="text" placeholder="예: 500">

<br><br>

<label>요구사항</label>

<textarea rows="6"
placeholder="원하는 사양, 재질, 색상 등을 입력하세요."></textarea>

<br><br>

<label>제품 이미지</label> <input type="file" multiple>

<br><br>

<button class="btn" type="submit">
견적 요청하기
</button>

</form>

</div>

</section>

</body>
</html>
